# Next.js on Netlify — the official Next runtime is auto-detected;
# no publish dir needed (handled by @netlify/plugin-nextjs).
[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "22"
  # Netlify auto-sets URL for canonical/OG/sitemap generation (src/lib/seo.ts).
  # On any other host, set NEXT_PUBLIC_SITE_URL to the production origin.

[[headers]]
  for = "/images/*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
